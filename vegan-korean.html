<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#F2E4D9">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>The Vegan Korean Cookbook Recipe Signup</title>
  <link rel="icon" type="image/x-icon" href="vegan-korean.ico">

  <style>
    :root {
      --onyx: #11120Dff;
      --forest-moss: #53711Dff;
      --sage-green: #589D35ff;
      --forest-green: #009400ff;
      --cayenne-red: #EB5E1Dff;

      --text-color: white;

      --primary: #00408f;
      --button-hover: #0047A0;
      --loading: #0047A0;
      --loading-text: white;
      --input-disabled: #ffffff88;
      --form-background: #236ac2;
      --background:
        radial-gradient(circle at 40% 48%,
          rgba(205, 46, 58, 0.95) 0%,
          rgba(205, 46, 58, 0.65) 18%,
          transparent 45%),
        radial-gradient(circle at 60% 52%,
          rgba(0, 71, 160, 0.95) 0%,
          rgba(0, 71, 160, 0.65) 18%,
          transparent 45%),
        conic-gradient(from 0deg,
          transparent,
          rgba(255, 255, 255, .25),
          transparent,
          rgba(255, 255, 255, .15),
          transparent);
      --background-color: #F2E4D9;
      --entry-background-odd: #CD2E3A;
      --entry-background-even: #ad1109;
      --main-title: #0047A0;
      --main-title-drop-shadow: var(--primary);
      --form-title: white;
      --form-title-weight: bold;
      --secondary-title: white;
      --secondary-title-shadow: #ad1109;
      --ingredient-list-style: korean-hangul-formal;
      --ingredient-list-padding: 70px;
    }
  </style>
  <link rel="stylesheet" href="assets/pan-loader.css">
  <link rel="stylesheet" href="main.css">
</head>

<body>
  <div id="background" class="fullscreen"></div>
  <div id="main" class="hidden">
    <h1>Will & Bella's<br />Cookbook Club</h1>

    <form id="signupForm" class="hidden">
      <h2 style="margin: 5px;">Recipe Signup</h2>
      <input type="text" id="translation" placeholder="Original (Translation)" disabled>
      <input type="search" id="recipe" list="recipes" autocomplete="off" placeholder="Choose a recipe" required>
      <datalist id="recipes"></datalist>
      <input type="text" id="category" placeholder="Category" disabled>
      <input type="text" id="chef" autocomplete="given-name" placeholder="Chef" required>
      <input type="text" id="sous-chef" placeholder="Sous-chef (optional)">
      <input type="text" id="notes" placeholder="Notes (optional)">
      <button type="submit">Claim Recipe</button>
    </form>

    <div id="summary" class="hidden">
      <div class="card">
        <h2>Claimed!</h2>
        <p>
          <b><span id="recipeName"></span></b>
          </br>
          <span id="recipeTranslation" style="opacity: 0.8;"></span>
          </br></br>
          <span id="recipeCategory"></span>
          (page <span id="recipePage">0</span>)
        </p>
        <h2>Ingredients</h2>
        <p><i><span id="recipeYield"></span></i></p>
        <p><i>Difficulty: <span id="recipeDifficulty"></span></i></p>
        <ul id="ingredientList"></ul>
      </div>
    </div>

    <div id="claimAgain" class="hidden" style="padding-bottom: 30px">
      <button type="reset">Claim Another</button>
    </div>
    <form id="eventPassed" class="hidden">
      <h2>The event has passed :(</h2>
    </form>

    <h2>Claimed Recipes</h2>

    <!-- Snake Loading GIF from https://briankuhnart.myportfolio.com/ -->
    <div id="recipeLoading" class="centered-hz" style="width: 80vw">
      <img src="assets/slithering-snake.gif" style="max-width: 100%; max-height: 100%" title="Loading" />
    </div>
    <div id="recipeList"></div>
  </div>

  <!-- Pancake Loader by https://dariocorsi.com/ -->
  <div id="loading" class="hidden fullscreen">
    <div id="popup" class="centered">
      <div id="pancake" class="loader">
        <div class="tall-stack">
          <div class="butter falling-element"></div>
          <div class="pancake falling-element"></div>
          <div class="pancake falling-element"></div>
          <div class="pancake falling-element"></div>
          <div class="pancake falling-element"></div>
          <div class="pancake falling-element"></div>
          <div class="pancake falling-element"></div>
          <div class="plate">
            <div class="plate-bottom"></div>
            <div class="shadow"></div>
          </div>
        </div>
      </div>
      <h2>Welcome to the party!<br />Please be patient :3</h2>
    </div>
  </div>
  <script type="module">
    import { categories, recipes } from "./vegan-korean-recipes.js";
    import { App } from "./main.js";
    const discourageMsg = "This recipe is too small, make sure it is accompanying a main dish.";
    const CONFIG = {
      CLUB_ID: "2607_vegan_korean",
      EVENT_DATE: new Date('2026-07-26T18:30'),
      VALIDATE_RECIPES: true,
      RECIPES: recipes,
      DISCOURAGE_MSG: discourageMsg,
    }
    App.init(CONFIG);
  </script>

</body>

</html>
